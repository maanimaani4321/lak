name: Android

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-24.04
    name: Android SDK Build
    permissions:
      contents: write

    steps:
    # ۱. آزاد کردن حدود ۳۰ گیگابایت فضای دیسک
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: false
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true

    - name: Configure Git to use Token
      run: |
        git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

    # ۲. تنظیم کش برای ذخیره سازی ACE و فایل‌های ساخته شده
    - name: Cache Build Data
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/Build/build-release-android-armeabi-v7a
          ${{ github.workspace }}/Build/build-release-android-arm64-v8a
        key: ${{ runner.os }}-android-v7-v8-${{ hashFiles('**/Makefile', '**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-android-v7-v8-

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r26b

    - name: Update Ubuntu repository
      run: sudo apt-get update

    - name: Install dependencies
      working-directory: ${{github.workspace}}/Build
      run: sudo make depend-ubuntu24-android

    # ۳. بیلد فقط برای ARMv7 و ARM64 (حذف x86 و تست‌های جاوا)
    - name: Build TeamTalk SDK (v7a and v8a)
      working-directory: ${{github.workspace}}/Build
      run: |
        make CMAKE_EXTRA="-G Ninja -DFEATURE_WEBRTC=OFF -DCMAKE_INSTALL_PREFIX=${{runner.workspace}}/install-android" android-armeabi-v7a
        make CMAKE_EXTRA="-G Ninja -DFEATURE_WEBRTC=OFF -DCMAKE_INSTALL_PREFIX=${{runner.workspace}}/install-android" android-arm64-v8a
        make CMAKE_BUILD_EXTRA="--target install" android-armeabi-v7a
        make CMAKE_BUILD_EXTRA="--target install" android-arm64-v8a
      env:
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ۴. آپلود فقط فایل‌های .so و SDK نهایی
    - name: Upload TeamTalk SDK (.so files)
      uses: actions/upload-artifact@v4
      with:
        name: teamtalk-sdk-android-so
        path: ${{runner.workspace}}/install-android