name: Android SDK Build

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-24.04
    name: Android SDK Build
    permissions:
      contents: write

    steps:
    # ۱. استفاده از پاکسازی قوی‌تر برای اطمینان از فضای کافی برای WebRTC
    - name: Maximize Build Space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo docker image prune --all --force
        df -h

    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true

    - name: Configure Git
      run: |
        git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

    # ۲. فراخوانی کَش (اینجا همان فایل‌های بیلد قبلی شما را برمی‌گرداند)
    - name: Cache Build Data
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/Build/build-release-android-armeabi-v7a
          ${{ github.workspace }}/Build/build-release-android-arm64-v8a
        key: ${{ runner.os }}-android-v7-v8-${{ hashFiles('**/Makefile', '**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-android-v7-v8-

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r26b

    - name: Update Ubuntu repository
      run: sudo apt-get update

    - name: Install dependencies
      working-directory: ${{github.workspace}}/Build
      run: sudo apt-get install -y autoconf cmake doxygen libtool nasm ninja-build p7zip-full pkg-config wget xz-utils

    # ۳. فعال کردن WebRTC (تغییر از OFF به ON)
    - name: Build TeamTalk SDK (v7a and v8a)
      working-directory: ${{github.workspace}}/Build
      run: |
        make CMAKE_EXTRA="-G Ninja -DFEATURE_WEBRTC=ON -DCMAKE_INSTALL_PREFIX=${{runner.workspace}}/install-android" android-armeabi-v7a
        make CMAKE_EXTRA="-G Ninja -DFEATURE_WEBRTC=ON -DCMAKE_INSTALL_PREFIX=${{runner.workspace}}/install-android" android-arm64-v8a
      env:
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload TeamTalk SDK (.so files)
      uses: actions/upload-artifact@v4
      with:
        name: teamtalk-sdk-android-so-WITH-WEBRTC
        path: ${{runner.workspace}}/install-android