name: Android v8 Optimized

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout_code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: install_dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf cmake libtool ninja-build p7zip-full pkg-config wget python3

      - name: setup_ndk
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: build_sdk_v8
        working-directory: ${{github.workspace}}/Build
        run: |
          make CMAKE_EXTRA="-G Ninja -DFEATURE_WEBRTC=ON -DCMAKE_INSTALL_PREFIX=${{runner.workspace}}/install-v8" android-arm64-v8a
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: export_artifacts
        if: always()
        run: |
          mkdir -p final_output/binaries
          mkdir -p final_output/dependencies
          
          find . -name "libTeamTalk5*.so" ! -name "*pro*" -exec cp {} final_output/binaries/ \; || true
          
          if [ -d "${{runner.workspace}}/install-v8" ]; then
            cp -r ${{runner.workspace}}/install-v8/* final_output/dependencies/
          else
            echo "Warning: Install directory not found at standard location, searching..."
            INSTALL_PATH=$(find . -name "libACE.a" | sed 's|/ace/lib/libACE.a||' | head -n 1)
            if [ -n "$INSTALL_PATH" ]; then cp -r $INSTALL_PATH/* final_output/dependencies/; fi
          fi

          mkdir -p final_output/teamtalk_headers
          find Library/ -name "*.h" -exec cp --parents {} final_output/teamtalk_headers/ \; || true

      - name: upload_results
        uses: actions/upload-artifact@v4
        with:
          name: TeamTalk-v8-Offline-Package
          path: final_output/