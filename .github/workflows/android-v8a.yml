name: Android v8 Optimized

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout_code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: install_dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf cmake libtool ninja-build p7zip-full pkg-config wget python3

      - name: setup_ndk
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: build_sdk_v8
        working-directory: ${{github.workspace}}/Build
        run: |
          make CMAKE_EXTRA="-G Ninja -DFEATURE_WEBRTC=ON -DCMAKE_INSTALL_PREFIX=${{runner.workspace}}/install-v8" android-arm64-v8a 2>&1 | tee build_v8_log.txt
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: export_artifacts
        if: always()
        run: |
          export OUT_DIR="${{github.workspace}}/final_output"
          mkdir -p $OUT_DIR/dependencies/webrtc/include
          mkdir -p $OUT_DIR/dependencies/webrtc/lib
          mkdir -p $OUT_DIR/dependencies/third_party
          mkdir -p $OUT_DIR/teamtalk/bin
          mkdir -p $OUT_DIR/teamtalk/include
          mkdir -p $OUT_DIR/logs

          cp Build/build_v8_log.txt $OUT_DIR/logs/ || true

          if [ -d "${{runner.workspace}}/install-v8" ]; then
            echo "Copying pre-built dependencies..."
            cp -r ${{runner.workspace}}/install-v8/* $OUT_DIR/dependencies/third_party/ || true
          fi

          echo "Searching for WebRTC source headers..."
          WEBRTC_PATH=$(find ${{github.workspace}}/.. -name "webrtc" -type d | head -n 1)
          if [ -n "$WEBRTC_PATH" ]; then
            cd "$WEBRTC_PATH"
            find . -name "*.h" -exec cp --parents {} $OUT_DIR/dependencies/webrtc/include/ \; || true
            cd ${{github.workspace}}
          fi

          echo "Collecting WebRTC static libraries..."
          find Build/ -name "*.a" | grep -i "obj" | xargs -I{} cp {} $OUT_DIR/dependencies/webrtc/lib/ || true

          echo "Collecting TeamTalk binaries..."
          find . -name "libTeamTalk5*jni.so" -exec cp {} $OUT_DIR/teamtalk/bin/ \; || true

          find Library/TeamTalk_DLL -name "*.a" -exec cp {} $OUT_DIR/teamtalk/bin/ \; || true

          echo "Collecting TeamTalk headers..."
          find Library/ -name "*.h" -exec cp --parents {} $OUT_DIR/teamtalk/include/ \; || true

          rm -rf $OUT_DIR/dependencies/third_party/catch2 || true

      - name: upload_results
        uses: actions/upload-artifact@v4
        with:
          name: TeamTalk-v8-Offline-Package
          path: final_output/