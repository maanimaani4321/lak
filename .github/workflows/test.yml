name: Android v8 Secure (No Pro)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout_code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: install_dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf cmake libtool ninja-build p7zip-full pkg-config wget python3 python3-pip zip unzip
          pip3 install pyelftools --break-system-packages

      - name: Download O-MVLL Plugin
        run: |
          echo "Downloading O-MVLL 1.6.0..."
          wget https://github.com/open-obfuscator/o-mvll/releases/download/1.6.0/omvll_v1-6-0_linux_2026-04-23T13_47_22.tar.gz
          tar -xzf omvll_v1-6-0_linux_2026-04-23T13_47_22.tar.gz
          find . -name "omvll-ndk.so" -exec cp {} . \;
          chmod +x omvll-ndk.so
          ls -l omvll-ndk.so
          

          sudo mkdir -p /cpython-install
          
          PYTHON_SRC=$(find $(pwd) -name "Python-3.10.7" -type d | head -n 1)
          sudo cp -r $PYTHON_SRC/* /cpython-install/
          
          if [ -d "/cpython-install/Lib" ]; then
            sudo ln -s /cpython-install/Lib /cpython-install/lib
          fi
          
          sudo mkdir -p /cpython-install/lib/python3.10
          sudo ln -s /cpython-install/Lib/* /cpython-install/lib/python3.10/ || true
          
          sudo cp ${{ github.workspace }}/omvll_config.py /cpython-install/lib/python3.10/
          
          echo "Final check of the paths:"
          ls -l /cpython-install/lib/python3.10/omvll_config.py

      - name: setup_ndk
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      # مرحله جایگزین شده به جای کش قدیمی؛ بازیابی از Releases گیت‌هاب به مسیر کاملاً بومی و طبیعی
      - name: Retrieve Pre-built Toolchain from Releases
        id: get-prebuilt
        run: |
          # ساخت مسیر درختی بومی پروژه پیش از استخراج فایل زیپ جهت جلوگیری از خطای آدرس‌دهی
          mkdir -p Build/build-release-android-arm64-v8a/Library/TeamTalkLib/build
          
          echo "Checking for pre-compiled dependencies in GitHub Releases..."
          if gh release download prebuilts -p "dependencies-arm64-v8a.zip" -D . --clobber 2>/dev/null; then
            echo "Pre-compiled dependencies ZIP found. Unzipping directly to natural build directory..."
            unzip -q dependencies-arm64-v8a.zip -d Build/build-release-android-arm64-v8a/Library/TeamTalkLib/build/
            echo "cache-hit=true" >> $GITHUB_OUTPUT
          else
            echo "Pre-compiled dependencies ZIP not found."
            echo "cache-hit=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: build_sdk_v8
        working-directory: ${{github.workspace}}/Build
        run: |
          if [ "${{ steps.get-prebuilt.outputs.cache-hit }}" = "true" ]; then
            echo "Cache hit! Reusing pre-built toolchain libraries to save time."
            make CMAKE_EXTRA="-G Ninja -DFEATURE_WEBRTC=ON -DTOOLCHAIN_BUILD_EXTERNALPROJECTS=OFF" android-arm64-v8a
          else
            echo "Cache miss! Compiling the entire toolchain from scratch."
            make CMAKE_EXTRA="-G Ninja -DFEATURE_WEBRTC=ON -DTOOLCHAIN_BUILD_EXTERNALPROJECTS=ON" android-arm64-v8a
            
            # پس از پایان بیلد طبیعی، پوشه ایزوله install را فشرده کرده و به ریشه پروژه منتقل می‌کنیم
            echo "Compiling completed. Packaging the natural dependencies install folder..."
            cd build-release-android-arm64-v8a/Library/TeamTalkLib/build/
            zip -r ../../../../../dependencies-arm64-v8a.zip install
          fi
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      # ذخیره‌سازی خودکار در بخش Release مخزن شما جهت استفاده‌های برنامه‌نویسی جریان کارهای بعدی
      - name: Upload Prebuilt Dependencies to GitHub Releases
        if: steps.get-prebuilt.outputs.cache-hit != 'true'
        run: |
          echo "Uploading prebuilt package to GitHub Releases..."
          gh release upload prebuilts dependencies-arm64-v8a.zip --clobber || \
          gh release create prebuilts dependencies-arm64-v8a.zip --title "Prebuilt Toolchain Dependencies" --notes "Automated prebuilt packages for TeamTalk dependencies"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ذخیره‌سازی در آرتفکشن اجرای جاری جهت دسترسی راحت و دانلود دستی مستقیم شما از تب Actions گیت‌هاب
      - name: Upload Prebuilt Dependencies to Actions Artifacts
        if: steps.get-prebuilt.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: prebuilt-dependencies-android-arm64-v8a
          path: dependencies-arm64-v8a.zip

      - name: export_artifacts
        if: always()
        run: |
          mkdir -p final_output/binaries
          mkdir -p final_output/dependencies
          
          find . -name "libTeamTalk5*jni.so" ! -name "*Pro*" -exec cp {} final_output/binaries/ \; || true
          
          mkdir -p final_output/teamtalk_headers
          find Library/ -name "*.h" -exec cp --parents {} final_output/teamtalk_headers/ \; || true

      - name: upload_results
        uses: actions/upload-artifact@v4
        with:
          name: TeamTalk-v8-Offline-Package
          path: final_output/