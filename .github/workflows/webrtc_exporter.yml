name: WebRTC Multi-Arch Exporter

on:
  workflow_dispatch:

jobs:
  export_webrtc:
    name: Build WebRTC for ${{ matrix.abi }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false # بسیار مهم: اگر یکی شکست خورد، آن یکی را کنسل نکن
      matrix:
        include:
          - abi: "armeabi-v7a"
            make_cmd: "android-armeabi-v7a"
          - abi: "arm64-v8a"
            make_cmd: "android-arm64-v8a"

    steps:
      - name: Maximize Disk Space (Aggressive)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/share/powershell /usr/share/swift
          sudo docker image prune --all --force
          sudo apt-get clean
          df -h

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf cmake libtool ninja-build p7zip-full wget

      - name: Build WebRTC Only
        working-directory: ${{github.workspace}}/Build
        run: |
          make CMAKE_EXTRA="-G Ninja -DFEATURE_WEBRTC=ON" ${{ matrix.make_cmd }}
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Prepare Artifacts
        if: always() # حتی اگر مراحل قبل خطا داشت، سعی کن فایل‌های ساخته شده را برداری
        run: |
          mkdir -p output/${{ matrix.abi }}/lib
          # تلاش برای کپی کردن؛ اگر فایل نبود خطا ندهد
          cp -r Build/build-release-android-${{ matrix.abi }}/webrtc/include output/${{ matrix.abi }}/ || true
          cp Build/build-release-android-${{ matrix.abi }}/webrtc/obj/modules/audio_processing/libteamtalk.a output/${{ matrix.abi }}/lib/ || true

      - name: Upload Pre-built WebRTC
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webrtc-prebuilt-${{ matrix.abi }}
          path: output/${{ matrix.abi }}/