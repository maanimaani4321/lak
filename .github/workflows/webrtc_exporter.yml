name: WebRTC Nuclear Standalone Build (ARM64)

on:
  workflow_dispatch: # اجرای دستی از تب Actions

jobs:
  build_webrtc:
    runs-on: ubuntu-24.04
    name: Build WebRTC v8a
    steps:
      - name: ☢️ Aggressive Disk Cleanup
        run: |
          echo "Space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/local/share/powershell /usr/share/swift /usr/local/lib/node_modules
          sudo docker image prune --all --force
          sudo apt-get clean
          echo "Space after cleanup:"
          df -h

      - name: Checkout TeamTalk (Private Repo)
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf cmake libtool ninja-build p7zip-full wget python3 python-is-python3

      - name: Setup Depot Tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$(pwd)/depot_tools" >> $GITHUB_PATH

      - name: 📥 Fetch WebRTC Source
        run: |
          mkdir -p ~/webrtc_standalone
          cd ~/webrtc_standalone
          export PATH=$PATH:$(pwd)/../depot_tools
          # دانلود سورس اندروید (فقط شاخه مورد نیاز برای صرفه‌جویی در فضا)
          fetch --nohooks webrtc_android
          cd src
          git checkout branch-heads/6818
          gclient sync -D --force --reset --nohooks
          echo "Disk space after fetch:"
          df -h

      - name: 🛠️ Apply libteamtalk Patch
        run: |
          cd ~/webrtc_standalone/src
          # اعمال پچی که در مسیر پروژه خصوصی شما قرار دارد
          git apply ${{ github.workspace }}/Library/TeamTalkLib/build/webrtc/libteamtalk-r6818.patch
          echo "Patch applied successfully."

      - name: 🏗️ GN Gen & Ninja Build (ARM64)
        run: |
          cd ~/webrtc_standalone/src
          export PATH=$PATH:$(pwd)/../depot_tools
          # تنظیمات فوق بهینه برای بیلد تک معماری و کوچک
          gn gen out/Release "--args=target_os=\"android\" target_cpu=\"arm64\" is_debug=false rtc_include_tests=false rtc_build_examples=false rtc_use_h264=false is_component_build=false"
          # ساخت هدف اختصاصی teamtalk که در پچ اضافه شده
          ninja -v -C out/Release teamtalk
          echo "Build finished. Final disk check:"
          df -h

      - name: 📦 Export Artifacts
        run: |
          mkdir -p ${{ github.workspace }}/webrtc_final/lib
          mkdir -p ${{ github.workspace }}/webrtc_final/include
          
          # کپی فایل استاتیک نهایی (تک فایل)
          cp ~/webrtc_standalone/src/out/Release/obj/modules/audio_processing/libteamtalk.a ${{ github.workspace }}/webrtc_final/lib/
          
          # کپی هدر فایل‌ها (فقط فایل‌های .h مورد نیاز)
          cd ~/webrtc_standalone/src
          find . -name "*.h" -exec cp --parents {} ${{ github.workspace }}/webrtc_final/include/ \; || true

      - name: Upload Pre-built WebRTC
        uses: actions/upload-artifact@v4
        with:
          name: webrtc-android-arm64-v8a-complete
          path: ${{ github.workspace }}/webrtc_final/